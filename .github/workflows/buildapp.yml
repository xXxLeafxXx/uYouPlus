# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml
# Improved version with better error handling and comments

name: Build and Release uYouPlus

on:
  workflow_dispatch:
    inputs:
      uyou_version:
        description: "Версия uYou (например, 3.0.4)"
        default: "3.0.4"
        required: true
        type: string
      uyou_url:
        description: "Ссылка на uYou .deb файл (опционально)"
        default: "https://github.com/dayanch96/uYou/releases/download/3.0.4/com.dvntm.uyou_3.0.4_iphoneos-arm.deb"
        required: false
        type: string
      decrypted_youtube_url:
        description: "Прямая ссылка на расшифрованную YouTube .ipa (ОБЯЗАТЕЛЬНО)"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Bundle ID приложения (не меняйте, если не уверены)"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Название приложения на экране (не меняйте, если не уверены)"
        default: "YouTube"
        required: true
        type: string
      create_release:
        description: "Создать черновик релиза после сборки"
        default: true
        required: false
        type: boolean
      upload_artifact:
        description: "Загрузить .ipa как артефакт (для скачивания без релиза)"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouPlus
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      # 1. Скачиваем ваш репозиторий
      - name: 📦 Checkout Main
        uses: actions/checkout@v4.2.1
        with:
          path: main
          submodules: recursive

      # 2. Устанавливаем необходимые инструменты
      - name: 🍺 Caching brew dependencies
        id: brew_cache
        uses: tecolicom/actions-use-homebrew-tools@v1.2
        with:
          tools: ldid dpkg make
          cache: yes

      - name: 📦 Install Dependencies (if not cached)
        if: steps.brew_cache.outputs.cache-hit != 'true'
        run: brew install ldid dpkg make

      - name: ⚙️ Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # 3. Настраиваем Theos (инструмент для сборки твиков)
      - name: 🔧 Setup Theos
        uses: actions/checkout@v4.2.1
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      # 4. Кэшируем SDK (чтобы не скачивать каждый раз)
      - name: 💾 Caching SDK
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iOS-16.5-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}

      - name: 📥 Download iOS 16.5 SDK (if not cached)
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          echo "==> Скачиваем iOS 16.5 SDK..."
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git && cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
          echo "==> SDK установлен в: $THEOS/sdks/"
        env:
          THEOS: ${{ github.workspace }}/theos

      # 5. Настраиваем Theos Jailed (для работы без джейлбрейка)
      - name: 🔐 Setup Theos Jailed
        uses: actions/checkout@v4.2.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: 🔧 Install Theos Jailed
        run: |
          echo "==> Устанавливаем Theos Jailed..."
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      # 6. Скачиваем и подготавливаем YouTube IPA
      - name: 🎬 Prepare YouTube iPA
        id: prepare_youtube
        run: |
          echo "==> Скачиваем YouTube IPA..."
          wget "$YOUTUBE_URL" --no-verbose -O main/YouTube.ipa
          
          cd ${{ github.workspace }}/main
          
          echo "==> Распаковываем IPA..."
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          
          echo "==> Определяем версию YouTube..."
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> ✅ YouTube v$youtube_version готов!"
          
          # Автоматически находим и заменяем строку с версией в Makefile
          if grep -q "^YOUTUBE_VERSION ?=" Makefile; then
            sed -i '' "s|^YOUTUBE_VERSION ?=.*|YOUTUBE_VERSION = ${youtube_version}|g" Makefile
            echo "==> ✅ Обновлено YOUTUBE_VERSION в Makefile"
          else
            echo "==> ⚠️ Предупреждение: строка YOUTUBE_VERSION не найдена в Makefile"
          fi
          
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT

        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ inputs.decrypted_youtube_url }}

      # 7. Скачиваем и внедряем uYou (если указана ссылка)
      - name: 🎨 Integrate uYou Tweak
        if: ${{ inputs.uyou_url != '' }}
        run: |
          echo "==> Скачиваем uYou..."
          wget "$UYOU_URL" --no-verbose -O uyou.deb
          
          echo "==> Распаковываем uYou..."
          dpkg -x uyou.deb uyou_extracted
          
          echo "==> Копируем файлы uYou в проект..."
          cp -r uyou_extracted/var/jb/Library/Application\ Support/uYou/* main/uYouPlus/
          
          echo "==> ✅ uYou интегрирован!"
        env:
          UYOU_URL: ${{ inputs.uyou_url }}

      # 8. Собираем финальный пакет
      - name: 🔨 Build Package
        id: build_package
        run: |
          echo "==> Подготовка к сборке..."
          mkdir -p theos/lib/iphone/rootless
          cd ${{ github.workspace }}/main
          
          # Обновляем Bundle ID и название приложения (безопасная замена)
          if grep -q "^BUNDLE_ID ?=" Makefile; then
            sed -i '' "s|^BUNDLE_ID ?=.*|BUNDLE_ID = ${{ env.BUNDLE_ID }}|g" Makefile
            echo "==> ✅ Bundle ID установлен: ${{ env.BUNDLE_ID }}"
          fi
          
          if grep -q "^DISPLAY_NAME ?=" Makefile; then
            sed -i '' "s|^DISPLAY_NAME ?=.*|DISPLAY_NAME = ${{ env.APP_NAME }}|g" Makefile
            echo "==> ✅ Название приложения: ${{ env.APP_NAME }}"
          fi
          
          echo "==> Запускаем сборку (это может занять 10-20 минут)..."
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          
          # Проверяем, что файл создан
          if [ -f packages/*.ipa ]; then
            package_name=$(ls -t packages/*.ipa | head -n1 | xargs basename)
            echo "package=packages/$package_name" >> $GITHUB_OUTPUT
            echo "==> ✅ Сборка завершена! Файл: $package_name"
            echo -e "==> 🔐 SHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')"
          else
            echo "==> ❌ ОШИБКА: Файл .ipa не был создан!"
            ls -la packages/
            exit 1
          fi
        env:
          THEOS: ${{ github.workspace }}/theos
          UYOU_VERSION: ${{ inputs.uyou_version }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}

      # 9. Загружаем артефакт (опционально)
      - name: ⬆️ Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4.4.3
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouPlus_${{ env.YOUTUBE_VERSION }}_${{ env.UYOU_VERSION }}
          path: ${{ steps.build_package.outputs.package }}
          if-no-files-found: error
          retention-days: 7

      # 10. Создаём релиз на GitHub (опционально)
      - name: 🚀 Create Release
        if: ${{ inputs.create_release }}
        id: create_release
        uses: qnblackcat/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
          DRAFT: ${{ inputs.create_release }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          name: uYouPlus v${{ env.YOUTUBE_VERSION }} (uYou ${{ env.UYOU_VERSION }})
          body: |
            ## uYouPlus Build
            - YouTube: v${{ env.YOUTUBE_VERSION }}
            - uYou: v${{ env.UYOU_VERSION }}
            - Сборка: #${{ github.run_number }}
            - Дата: ${{ github.event.repository.updated_at }}
            
            > ⚠️ Этот файл собран автоматически. Используйте на свой страх и риск.
          files: main/packages/*.ipa
          draft: true
          prerelease: false
